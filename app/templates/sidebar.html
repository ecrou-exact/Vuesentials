<div id="sidebar" class="collapse collapse-horizontal show border-end bg-light">
    <div class="d-flex flex-column flex-shrink-0 p-3" style="width: 250px; ">
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="/" class="nav-link {{ 'active' if request.path == '/' else 'link-dark' }}">
                    <i class="fa-solid fa-house fa-fw me-3"></i> Home
                </a>
            </li>
        </ul>

        <hr>

        <div class="dropdown">
            {% if current_user.is_authenticated %}
            <a href="/account" class="nav-link {{ 'active' if request.path == '/account' else 'link-dark' }}">
                <i class="fa-solid fa-user fa-fw me-3"></i> My Profile
            </a>
            <a href="/account/logout" class="nav-link link-danger">
                <i class="fa-solid fa-door-open fa-fw me-3"></i> Logout
            </a>
            {% else %}
            <a href="/login" class="nav-link link-primary">
                <i class="fa-solid fa-key fa-fw me-3"></i> Login
            </a>
            {% endif %}
        </div>
    </div>
</div>
