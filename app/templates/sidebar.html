        <!-- Footer Section -->
        <div class="sidebar-footer">
            {% if current_user.is_authenticated %}
            <a href="/account" class="user-card">
                <div class="user-avatar">
                    <span>{{ current_user.username()[0].upper() }}</span>
                </div>
                <div class="user-details">
                    <div class="user-name">{{ current_user.username() }}</div>
                    <div class="user-role">{{ current_user.role() }}</div>
                </div>
                <i class="fa-solid fa-chevron-right"></i>
            </a>
            <a href="/account/logout" class="logout-btn">
                <i class="fa-solid fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
            {% else %}
            <a href="/account/login" class="btn btn-outline-primary btn-sm rounded-pill px-3">
