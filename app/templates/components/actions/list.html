{% extends 'base.html' %}

{% block content %}
<div class="components-list-container" v-cloak>
    <!-- Header Section -->
    <div class="components-header mb-5">
        <h1 class="mb-2">Component Gallery</h1>
        <p class="text-muted">Explore our collection of Vue.js components</p>
    </div>

    <!-- Filter Bar Component -->
    <component-filter-bar ref="filterBar" api-endpoint="/components/list" @update:results="onComponentsUpdated"
        @loading="search_is_loading = $event">
    </component-filter-bar>

    <!-- Loading State -->
    <template v-if="search_is_loading">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-muted mt-3">Loading components...</p>
        </div>
    </template>

    <!-- Components Grid -->
    <template v-if="!search_is_loading && components_list.length > 0">

        <!-- Results Info -->
        <div class="results-info mb-4">
            <small class="text-muted">
                [[ components_list.length ]] of [[ total_components ]] components
            </small>
        </div>

        <!-- Pagination Top -->
        <pagination-component :current-page="current_page" :total-pages="total_pages" @change-page="changePage">
        </pagination-component>

        <!-- Grid -->
        <div class="components-grid">
            <div v-for="component in components_list" :key="component.id" class="component-card">

                <!-- Accent Line -->
                <div class="card-accent-line"></div>

                <!-- Image Section -->
                <div class="component-image-section">
                    <img :src="component.get_image_url" :alt="component.title"
                        @error="$event.target.src='/static/images/components/placeholder.png'">
                </div>

                <!-- Badges -->
                <div class="card-badges">
                    <span v-if="component.is_featured" class="badge badge-featured">
                        <i class="fa-solid fa-star"></i> Featured
                    </span>
                    <span class="badge badge-difficulty" :class="`difficulty-${component.difficulty}`">
                        [[ component.difficulty ]]
                    </span>
                </div>

                <!-- Card Body -->
                <div class="card-body">

                    <!-- Category -->
                    <div class="component-meta">
                        <span class="meta-badge">
                            <i class="fa-solid fa-tag me-1"></i>[[ component.category ]]
                        </span>
                    </div>

                    <!-- Title -->
                    <h1 class="component-card-title">
                        <a :href="`/components/${component.id}`">
                            [[ component.title ]]
                        </a>
                    </h1>
                    <p class="component-version">v[[ component.version ]]</p>

                    <!-- Description -->
                    <p class="component-card-description">
                        [[ truncateText(component.description, 85) ]]
                    </p>

                    <!-- Tags -->
                    <div v-if="component.tags" class="component-card-tags">
                        <span v-for="(tag, idx) in parseTags(component.tags).slice(0, 2)" :key="idx" class="tag">
                            [[ tag ]]
                        </span>
                        <span v-if="parseTags(component.tags).length > 2" class="tag tag-more">
                            +[[ parseTags(component.tags).length - 2 ]]
                        </span>
                    </div>

                    <!-- Stats -->
                    <div class="component-card-stats">
                        <div class="stat">
                            <i class="fa-solid fa-eye"></i>
                            <span>[[ component.views_count ]]</span>
                        </div>
                        <div class="stat">
                            <i class="fa-solid fa-calendar"></i>
                            <span>[[ formatDate(component.created_at) ]]</span>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="component-card-actions">
                        <a :href="`/components/${component.id}`" class="btn-card-action btn-primary">
                            <i class="fa-solid fa-arrow-right"></i> View
                        </a>
                        <a class="btn-card-action btn-secondary" href="/components/edit/[[ component.id ]]"
                            title="Edit Component">
                            <i class="fa-solid fa-pen"></i>
                        </a>
                        <button @click="openDeleteModal(component.id, component.title)"
                            class="btn-card-action btn-secondary" title="Delete">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                        <button @click="downloadComponent(component.id, component.title)"
                            class="btn-card-action btn-secondary" title="Download">
                            <i class="fa-solid fa-download"></i>
                        </button>
                    </div>

                </div>
            </div>
        </div>
        <!-- Delete Confirmation Modal -->
        <div class="delete-modal-overlay" v-if="deleteModal.isOpen" @click.self="closeDeleteModal">
            <div class="delete-modal">
                <div class="delete-modal-header">
                    <h3>Delete Component</h3>
                    <button class="delete-modal-close" @click="closeDeleteModal">×</button>
                </div>

                <div class="delete-modal-body">
                    <div class="delete-modal-icon">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                    <p class="delete-modal-message">
                        Are you sure you want to delete <strong>[[ deleteModal.componentTitle ]]</strong>?
                    </p>
                    <p class="delete-modal-subtext">This action cannot be undone.</p>
                </div>

                <div class="delete-modal-footer">
                    <button @click="closeDeleteModal" class="btn-cancel">
                        Cancel
                    </button>
                    <button @click="confirmDelete" class="btn-confirm">
                        <i class="fa-solid fa-trash me-2"></i>Delete
                    </button>
                </div>
            </div>
        </div>
        <!-- Pagination Bottom -->
        <pagination-component :current-page="current_page" :total-pages="total_pages" @change-page="changePage">
        </pagination-component>

    </template>

    <!-- No Results -->
    <div v-if="!search_is_loading && components_list.length === 0" class="no-results">
        <div class="no-results-icon">
            <i class="fa-solid fa-search"></i>
        </div>
        <h3>No components found</h3>
        <p class="text-muted">Try adjusting your search or filters</p>
        <button @click="resetFilters" class="btn btn-outline-primary">
            <i class="fa-solid fa-arrow-rotate-left"></i> Reset Filters
        </button>
    </div>

</div>
{% endblock %}

{% block script %}
<script type="module">
    const { createApp, ref, onMounted } = Vue;
    import { message_list, create_message } from '/static/js/external_script/toaster.js';
    import ComponentFilterBar from '/static/js/components/actions/ComponentFilterBar.js';
    import PaginationComponent from '/static/js/components/actions/ComponentPagination.js';

    createApp({
        delimiters: ['[[', ']]'],
        components: {
            'component-filter-bar': ComponentFilterBar,
            'pagination-component': PaginationComponent,
        },
        setup() {
            const components_list = ref([]);
            const total_components = ref(0);
            const current_page = ref(1);
            const total_pages = ref(1);
            const search_is_loading = ref(false);
            const filterBar = ref(null);

            const onComponentsUpdated = (results) => {
                components_list.value = results.components || [];
                total_pages.value = results.total_pages || 1;
                current_page.value = results.current_page || 1;
                total_components.value = results.total_components || 0;
            };

            const changePage = (page) => {
                if (filterBar.value) {
                    filterBar.value.fetchComponents(page);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const truncateText = (text, length) => {
                if (!text) return '';
                return text.length > length ? text.substring(0, length) + '...' : text;
            };

            const formatDate = (dateString) => {
                if (!dateString) return 'Unknown';
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            };

            const copyCode = (code) => {
                if (!code) return;
                navigator.clipboard.writeText(code).then(() => {
                    message_list.value.push({
                        message: 'Code copied to clipboard!',
                        category: 'success'
                    });
                    setTimeout(() => message_list.value.pop(), 3000);
                }).catch(() => {
                    message_list.value.push({
                        message: 'Failed to copy code',
                        category: 'danger'
                    });
                });
            };

            async function downloadComponent(componentId, componentTitle) {
                try {
                    const response = await fetch(`/components/download/${componentId}`);

                    if (!response.ok) {
                        create_message("Failed to download component", "danger-subtle", true, "fas fa-exclamation-triangle");
                    }

                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `component-${componentTitle}.zip`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);

                    create_message("Component downloaded successfully", "success-subtle", true, "fas fa-check");
                } catch (error) {
                    create_message("Failed to download component", "danger-subtle", true, "fas fa-exclamation-triangle");
                }
            }

            const parseTags = (tags) => {
                if (!tags) return [];
                if (Array.isArray(tags)) return tags;
                return tags.split(',').map(tag => tag.trim()).filter(tag => tag);
            };

            const resetFilters = () => {
                if (filterBar.value) {
                    filterBar.value.clearFilters();
                }
            };

            const deleteModal = ref({
                isOpen: false,
                componentId: null,
                componentTitle: ''
            });

            const openDeleteModal = (componentId, componentTitle) => {
                deleteModal.value.isOpen = true;
                deleteModal.value.componentId = componentId;
                deleteModal.value.componentTitle = componentTitle;
            };

            const closeDeleteModal = () => {
                deleteModal.value.isOpen = false;
                deleteModal.value.componentId = null;
                deleteModal.value.componentTitle = '';
            };

            const confirmDelete = async () => {
                try {
                    const response = await fetch(`/components/delete/${deleteModal.value.componentId}`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token() }}'
                        }
                    });

                    if (!response.ok) {
                        create_message("Failed to delete component", "danger-subtle", true, "fas fa-exclamation-triangle");
                        return;
                    }

                    create_message("Component deleted successfully", "success-subtle", true, "fas fa-check");
                    closeDeleteModal();

                    setTimeout(() => {
                        window.location.reload();
                    }, 1500);
                } catch (error) {
                    create_message("Error deleting component", "danger-subtle", true, "fas fa-exclamation-triangle");
                    console.error('Error:', error);
                }
            };

            return {
                components_list,
                total_components,
                current_page,
                total_pages,
                search_is_loading,
                onComponentsUpdated,
                changePage,
                truncateText,
                formatDate,
                copyCode,
                downloadComponent,
                resetFilters,
                filterBar,
                message_list,
                parseTags,
                deleteModal,
                openDeleteModal,
                closeDeleteModal,
                confirmDelete
            };
        }
    }).mount('#main-container');
</script>
{% endblock %}
